name: Deploy

# Runs terraform plan + apply for the target environment.
#
# Triggers:
#   - push to main    -> automatically deploys to dev
#   - workflow_dispatch -> manually deploys to staging or prod
#
# Promotion path: dev (auto) -> staging (manual) -> prod (manual + approval)
#
# GitHub Environment protection rules enforce the gates:
#   dev     - no protection, auto-deploys on every merge to main
#   staging - required reviewers before the job runs
#   prod    - required reviewers + deployment protection rules
#
# AWS authentication uses OIDC (no long-lived access keys stored anywhere).
# Each environment has a dedicated IAM role: edp-{env}-github-actions-role
#
# Required GitHub configuration:
#   Environment variables (Settings -> Environments -> {env} -> Variables):
#     AWS_ACCOUNT_ID - the 12-digit AWS account ID
#   Environment secrets (Settings -> Environments -> {env} -> Secrets):
#     TF_VAR_DB_PASSWORD             - RDS master password
#     TF_VAR_REDSHIFT_ADMIN_PASSWORD - Redshift admin password
#
# Optional variables (omit to skip the SNS email subscription):
#   TF_VAR_alert_email - set inline below or via TF_VAR_ALERT_EMAIL env var

on:
  push:
    branches: [main]
    paths:
      - 'environments/**'
      - 'modules/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev auto-deploys on push to main)"
        required: true
        type: choice
        options: [dev, staging, prod]

# One deploy per environment at a time. If a new push arrives while a deploy
# is running, GitHub cancels the in-progress run. Terraform catches SIGTERM
# and releases the state lock before the runner exits, preventing stale locks.
concurrency:
  group: terraform-deploy-${{ github.ref_name }}-${{ inputs.environment || 'dev' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    env:
      TF_ENV: ${{ inputs.environment || 'dev' }}

    defaults:
      run:
        working-directory: environments/${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/edp-${{ env.TF_ENV }}-github-actions-role
          aws-region: eu-central-1

      # The profile setting in backend.tf is ignored in CI because AWS env vars
      # set by configure-aws-credentials take precedence over named profiles.
      - name: terraform init
        run: terraform init -backend-config="profile=" -reconfigure

      - name: terraform plan
        id: plan
        # -detailed-exitcode: 0=no changes, 1=error, 2=changes present.
        # continue-on-error so exit code 2 doesn't fail the step before we
        # capture it. The "Fail on plan error" step below re-raises code 1.
        continue-on-error: true
        run: |
          set -o pipefail
          terraform plan -detailed-exitcode -no-color -input=false -out=tfplan 2>&1 | tee /tmp/plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_redshift_admin_password: ${{ secrets.TF_VAR_REDSHIFT_ADMIN_PASSWORD }}
          TF_VAR_profile: ""
          # TF_VAR_alert_email is optional. When not set, the SNS topic is
          # created but no email subscriber is added. Set TF_VAR_ALERT_EMAIL
          # as an environment variable in GitHub Settings to enable alerts.

      - name: Write plan to job summary
        working-directory: ${{ github.workspace }}
        run: |
          echo "### Terraform Plan (${{ env.TF_ENV }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on plan error
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "Terraform plan failed. See plan output above."
          exit 1

      - name: No changes — skipping apply
        if: steps.plan.outputs.exit_code == '0'
        run: echo "Plan shows no infrastructure changes. Apply skipped."

      - name: terraform apply
        if: steps.plan.outputs.exit_code == '2'
        run: terraform apply -auto-approve -input=false tfplan

      - name: Deployment summary
        if: steps.plan.outputs.exit_code == '2'
        working-directory: ${{ github.workspace }}
        run: |
          echo ""
          echo "Terraform apply complete: edp-${{ env.TF_ENV }}"
          echo "Environment: ${{ env.TF_ENV }}"
          echo "Commit: ${{ github.sha }}"
