name: Deploy

# Deployment workflow for all three Terraform environments.
#
# Triggers:
#   - push to main    → automatically deploys to dev
#   - workflow_dispatch → manually deploys to staging or prod
#
# Promotion path: dev (auto) → staging (manual) → prod (manual + approval)
#
# GitHub Environment protection rules enforce the gates:
#   dev     — no protection (auto-deploys)
#   staging — required reviewers before the job runs
#   prod    — required reviewers + deployment protection rules
#
# AWS authentication uses OIDC (no long-lived access keys stored in secrets).
# Each environment has a dedicated IAM role: edp-{env}-github-actions-role
# That role must be created in Terraform before this workflow can run.
#
# Required GitHub configuration (Settings → Secrets and variables):
#   Repository variables:
#     AWS_ACCOUNT_ID   — the 12-digit AWS account ID
#   Repository secrets: none (OIDC replaces static credentials)
#   Environments: dev, staging, prod (create in Settings → Environments)

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, prod]

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest

    # This key activates GitHub Environment protection rules.
    # staging and prod environments should have required reviewers configured.
    environment: ${{ inputs.environment || 'dev' }}

    permissions:
      id-token: write   # required for OIDC
      contents: read

    env:
      TF_ENV: ${{ inputs.environment || 'dev' }}

    defaults:
      run:
        working-directory: environments/${{ env.TF_ENV }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      # Assumes the role edp-{env}-github-actions-role via OIDC.
      # The role trust policy must allow:
      #   Principal: { Federated: "arn:aws:iam::{account_id}:oidc-provider/token.actions.githubusercontent.com" }
      #   Condition: StringLike: { "token.actions.githubusercontent.com:sub": "repo:{owner}/{repo}:*" }
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/edp-${{ env.TF_ENV }}-github-actions-role
          aws-region: eu-central-1

      # The profile setting in backend.tf ("dev-admin" etc.) is ignored in CI
      # because AWS env vars set by configure-aws-credentials take precedence.
      - name: terraform init
        run: |
          terraform init \
            -backend-config="profile=" \
            -reconfigure

      - name: terraform plan
        run: terraform plan -out=tfplan -input=false
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_redshift_admin_password: ${{ secrets.TF_VAR_REDSHIFT_ADMIN_PASSWORD }}

      - name: terraform apply
        run: terraform apply -auto-approve -input=false tfplan
